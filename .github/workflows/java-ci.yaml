name: Greeting Workflow

on:
 push:
  branches:
    - main

jobs:
  build:
   runs-on: ubuntu-latest

   steps:
     - name: Checkout Repositary
       uses: actions/checkout@v4

     - name: Set Up JDK
       uses: actions/setup-java@v4
       with: 
        distribution: 'temurin'
        java-version: '17'

     - name: Run Custom Action
       id: greet-action
       uses: ./.github/actions/java-build
       with:
        username: Pasindu

     - name: Show Greeting
       run: echo "${{steps.custom-action.outputs.result}}"
