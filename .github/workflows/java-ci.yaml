name:Java CI Pipeline

on:
 push:
  branches:
   - main

jobs:
 build:
  runs-on: ubuntu-latest

  steps:

   -name:Checkout Repository
    uses:actions/checkout@v4

   -name:Set up JDK
    uses:actions/setup-java@v4
    with:
     distribution:'temurin'
     java-version:'17'

   -name:Compile Java Programe
    run:javac Main.java

   -name:Run Java Programe
    run:java Main